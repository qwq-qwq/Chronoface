<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chronoface</title>
    <meta name="description" content="Analog clock screensaver with luminescent night mode, inspired by luxury watch aesthetics">
    <meta property="og:title" content="Chronoface">
    <meta property="og:description" content="Analog clock screensaver with luminescent night mode">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23000'/><circle cx='50' cy='50' r='38' fill='none' stroke='%2300E8FF' stroke-width='2'/><line x1='50' y1='50' x2='50' y2='22' stroke='%2300E8FF' stroke-width='3' stroke-linecap='round'/><line x1='50' y1='50' x2='68' y2='50' stroke='%2300E8FF' stroke-width='2' stroke-linecap='round'/></svg>">
</head>
<body>
    <canvas id="clock"></canvas>

    <button id="settings-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87a.48.48 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>
        </svg>
    </button>

    <div id="overlay"></div>

    <aside id="panel">
        <h2>Chronoface</h2>

        <div id="appearance-tabs">
            <div class="tab-bar">
                <button class="tab" data-tab="day">Day</button>
                <button class="tab active" data-tab="night">Night</button>
            </div>
            <div class="tab-content" id="tab-day">
                <section>
                    <label>Theme</label>
                    <div id="theme-grid"></div>
                </section>
            </div>
            <div class="tab-content active" id="tab-night">
                <section>
                    <label>Lume Color</label>
                    <div id="lume-grid"></div>
                </section>
                <section>
                    <label>Glow <span id="glow-value"></span></label>
                    <input type="range" id="glow-slider" min="0" max="100" value="70">
                </section>
            </div>
        </div>

        <div class="auto-section">
            <label><input type="checkbox" id="auto-mode"> Auto (sunrise / sunset)</label>
        </div>

        <section>
            <label>Movement</label>
            <div id="movement-btns" class="btn-group">
                <button data-value="quartz">Quartz</button>
                <button data-value="mechanical">Mechanical</button>
                <button data-value="digital">Digital</button>
            </div>
        </section>

        <section>
            <label>City</label>
            <select id="city-select"></select>
        </section>

        <section>
            <label>Params</label>
            <div class="toggle-group">
                <label><input type="checkbox" id="show-date" checked> Date</label>
                <label><input type="checkbox" id="show-temp" checked> Temperature</label>
            </div>
        </section>

        <a id="github-link" href="https://github.com/" target="_blank" rel="noopener">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            View on GitHub
        </a>
    </aside>

    <script src="chronoface.js"></script>
</body>
</html>
