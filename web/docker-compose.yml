version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: chronoface-nginx
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx/conf.d:/etc/nginx/conf.d
      - chronoface_logs:/var/log/nginx
    environment:
      - TZ=Europe/Kiev
    networks:
      - traefik_web-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chronoface.rule=Host(`chronoface.perek.rest`)"
      - "traefik.http.routers.chronoface.entrypoints=websecure"
      - "traefik.http.routers.chronoface.tls=true"
      - "traefik.http.routers.chronoface.tls.certresolver=myresolver"
      - "traefik.http.services.chronoface.loadbalancer.server.port=80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  chronoface_logs:

networks:
  traefik_web-network:
    external: true