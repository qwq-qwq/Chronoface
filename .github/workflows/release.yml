name: Build .saver

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    env:
      # When app-signing secrets are absent (e.g. PR from a fork) we fall back to ad-hoc.
      HAS_APP_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.MACOS_DEVELOPER_ID != '' }}
      # PKG is built only when the installer cert is also configured.
      HAS_PKG_SIGNING: ${{ secrets.MACOS_CERTIFICATE != '' && secrets.MACOS_DEVELOPER_ID != '' && secrets.MACOS_INSTALLER_CERTIFICATE != '' && secrets.MACOS_INSTALLER_ID != '' }}
      # Notarisation runs only for tagged releases AND when Apple-ID secrets exist.
      DO_NOTARIZE: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_ID != '' && secrets.APPLE_APP_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Import signing certificates
        if: env.HAS_APP_SIGNING == 'true'
        env:
          APP_CERT_B64: ${{ secrets.MACOS_CERTIFICATE }}
          APP_CERT_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          INSTALLER_CERT_B64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -e
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          APP_CERT_PATH="$RUNNER_TEMP/app-cert.p12"
          echo "$APP_CERT_B64" | base64 --decode > "$APP_CERT_PATH"
          security import "$APP_CERT_PATH" \
            -P "$APP_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$APP_CERT_PATH"

          if [ -n "$INSTALLER_CERT_B64" ]; then
            INSTALLER_CERT_PATH="$RUNNER_TEMP/installer-cert.p12"
            echo "$INSTALLER_CERT_B64" | base64 --decode > "$INSTALLER_CERT_PATH"
            security import "$INSTALLER_CERT_PATH" \
              -P "$INSTALLER_CERT_PASSWORD" \
              -A -t cert -f pkcs12 \
              -k "$KEYCHAIN_PATH"
            rm -f "$INSTALLER_CERT_PATH"
          fi

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productbuild: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | xargs)

      - name: Build Chronoface.saver (signed)
        if: env.HAS_APP_SIGNING == 'true'
        env:
          DEV_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          xcodebuild \
            -project Chronoface/Chronoface.xcodeproj \
            -target Chronoface \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$DEV_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION" \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            clean build

      - name: Build Chronoface.saver (ad-hoc)
        if: env.HAS_APP_SIGNING != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          xcodebuild \
            -project Chronoface/Chronoface.xcodeproj \
            -target Chronoface \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION" \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            clean build

      - name: Notarize and staple .saver
        if: env.DO_NOTARIZE == 'true' && env.HAS_APP_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          cd build
          ditto -c -k --sequesterRsrc --keepParent Chronoface.saver Chronoface-notary.zip

          SUBMIT_OUT=$(xcrun notarytool submit Chronoface-notary.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)
          echo "$SUBMIT_OUT"

          SUB_ID=$(echo "$SUBMIT_OUT"  | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')
          STATUS=$(echo "$SUBMIT_OUT" | python3 -c 'import sys,json;print(json.load(sys.stdin)["status"])')

          echo "::group::Notarization log ($SUB_ID, status=$STATUS)"
          xcrun notarytool log "$SUB_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" || true
          echo "::endgroup::"

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS, see log above."
            exit 1
          fi

          xcrun stapler staple Chronoface.saver
          rm -f Chronoface-notary.zip

      - name: Package .saver as zip
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent Chronoface.saver ../Chronoface.saver.zip

      - name: Build Chronoface.pkg (signed)
        if: env.HAS_PKG_SIGNING == 'true'
        env:
          INSTALLER_ID: ${{ secrets.MACOS_INSTALLER_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          mkdir -p pkgroot "pkgroot/Library/Screen Savers" pkgscripts
          cp -R build/Chronoface.saver "pkgroot/Library/Screen Savers/"

          cat > pkgscripts/postinstall <<'POSTINSTALL'
          #!/bin/bash
          # Best-effort: open Screen Saver settings for the logged-in user.
          # Runs as root inside the installer; bounce into the user session.
          set +e
          USER_ID=$(stat -f "%u" /dev/console)
          if [ -n "$USER_ID" ] && [ "$USER_ID" != "0" ]; then
            launchctl asuser "$USER_ID" sudo -u "#$USER_ID" \
              open "x-apple.systempreferences:com.apple.ScreenSaver-Settings.extension"
          fi
          exit 0
          POSTINSTALL
          chmod +x pkgscripts/postinstall

          pkgbuild \
            --root pkgroot \
            --identifier com.screensaver.Chronoface.installer \
            --version "$VERSION" \
            --scripts pkgscripts \
            --ownership recommended \
            Chronoface-unsigned.pkg

          productsign --sign "$INSTALLER_ID" \
            Chronoface-unsigned.pkg \
            Chronoface.pkg

          rm -f Chronoface-unsigned.pkg
          pkgutil --check-signature Chronoface.pkg

      - name: Notarize and staple .pkg
        if: env.DO_NOTARIZE == 'true' && env.HAS_PKG_SIGNING == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e
          SUBMIT_OUT=$(xcrun notarytool submit Chronoface.pkg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)
          echo "$SUBMIT_OUT"

          SUB_ID=$(echo "$SUBMIT_OUT"  | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')
          STATUS=$(echo "$SUBMIT_OUT" | python3 -c 'import sys,json;print(json.load(sys.stdin)["status"])')

          echo "::group::Notarization log ($SUB_ID, status=$STATUS)"
          xcrun notarytool log "$SUB_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" || true
          echo "::endgroup::"

          if [ "$STATUS" != "Accepted" ]; then
            echo "PKG notarization failed with status: $STATUS, see log above."
            exit 1
          fi

          xcrun stapler staple Chronoface.pkg

      - name: Cleanup keychain
        if: always() && env.HAS_APP_SIGNING == 'true'
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" || true

      - name: Upload .saver.zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chronoface.saver
          path: Chronoface.saver.zip

      - name: Upload .pkg artifact
        if: env.HAS_PKG_SIGNING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Chronoface.pkg
          path: Chronoface.pkg

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Chronoface.pkg
            Chronoface.saver.zip
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## Установка

            **Рекомендуется:** скачайте `Chronoface.pkg`, дважды кликните, пройдите шаги установщика. Скринсейвер появится в System Settings → Screen Saver автоматически.

            **Вручную:** распакуйте `Chronoface.saver.zip`, дважды кликните `Chronoface.saver`.

            Приложение подписано Developer ID и нотарифицировано Apple, Gatekeeper не будет ругаться.